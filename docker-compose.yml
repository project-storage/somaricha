version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: somaricha-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: somaricha
      MYSQL_USER: somaricha_user
      MYSQL_PASSWORD: somaricha_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: somaricha-api
    restart: always
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: somaricha_user
      DB_PASSWORD: somaricha_password
      DB_DATABASE: somaricha
      JWT_SECRET: super_secure_jwt_secret_key_123!
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000/api
    container_name: somaricha-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mysql_data:
