services:
  db:
    image: postgres:15-alpine
    container_name: somaricha-postgres
    restart: always
    environment:
      POSTGRES_USER: somaricha_user
      POSTGRES_PASSWORD: somaricha_password
      POSTGRES_DB: somaricha
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: somaricha-api
    restart: always
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: somaricha_user
      DB_PASSWORD: somaricha_password
      DB_DATABASE: somaricha
      DATABASE_URL: postgresql://somaricha_user:somaricha_password@db:5432/somaricha?schema=public
      JWT_SECRET: super_secure_jwt_secret_key_123!
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000/api
    container_name: somaricha-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:

